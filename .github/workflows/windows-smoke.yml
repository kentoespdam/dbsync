name: Windows Smoke Test (TUI)

on:
  pull_request:
    paths:
      - 'internal/tui/**'
      - '.github/workflows/windows-smoke.yml'  # Self-trigger on workflow changes

jobs:
  windows-smoke:
    name: Windows Smoke Test
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          
      - name: Run TUI tests
        run: go test ./internal/tui/...
        
      - name: Build main binary
        run: go build ./cmd/dbsync