name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mysql-integration:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Skip on free GitHub-hosted runner
        run: |
          echo "MySQL integration tests are skipped on GitHub-hosted runners."
          echo "Reason: free-tier runner cannot reliably host the MySQL service container."
          echo "See docs/adr/0004-skip-mysql-integration-on-github-hosted-runners.md"
          echo "Run locally: go test -tags=integration ./..."
