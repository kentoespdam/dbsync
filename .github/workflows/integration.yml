name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  mysql-integration:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h localhost -u root -ptest --silent; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Create test database
        run: |
          mysql -h localhost -u root -ptest -e "CREATE DATABASE IF NOT EXISTS testdb;"

      - name: Run integration tests
        env:
          MYSQL_TEST_DSN: "root:test@tcp(localhost:3306)/testdb"
        run: go test -tags=integration ./...